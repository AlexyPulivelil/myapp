name: Deploy to Production

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: myapp

jobs:
  promote:
    name: Promote image from staging
    runs-on: ubuntu-latest
    # Requires the 'production' GitHub Environment with a protection rule
    # (at least one required reviewer) configured in repo Settings → Environments.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse version tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHA=$(git rev-list -n 1 "${GITHUB_REF_NAME}")
          SHORT_SHA="${SHA:0:7}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Re-tag staging image as version + latest
        run: |
          SOURCE_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:sha-${{ steps.version.outputs.sha }}"
          VERSION_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          LATEST_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"

          docker pull "${SOURCE_IMAGE}"
          docker tag "${SOURCE_IMAGE}" "${VERSION_IMAGE}"
          docker tag "${SOURCE_IMAGE}" "${LATEST_IMAGE}"
          docker push "${VERSION_IMAGE}"
          docker push "${LATEST_IMAGE}"

          echo "Promoted sha-${{ steps.version.outputs.sha }} → ${{ steps.version.outputs.version }} + latest"

      - name: Download current production task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ secrets.CLUSTER_NAME }}-app" \
            --query taskDefinition \
            > task-definition.json

      - name: Render task definition with production image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Deploy to production ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ secrets.CLUSTER_NAME }}-app
          cluster: ${{ secrets.CLUSTER_NAME }}
          wait-for-service-stability: true

      - name: Health check loop — poll /health for 60s, rollback on failure
        run: |
          ALB_URL=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName,'production')].DNSName | [0]" \
            --output text)

          echo "Polling https://${ALB_URL}/health for 60 seconds..."

          DEADLINE=$(($(date +%s) + 60))
          HEALTHY=false

          while [ "$(date +%s)" -lt "${DEADLINE}" ]; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "https://${ALB_URL}/health" || echo "000")
            if [ "${STATUS}" = "200" ]; then
              echo "Health check passed: HTTP ${STATUS}"
              HEALTHY=true
              break
            fi
            echo "HTTP ${STATUS} — retrying..."
            sleep 5
          done

          if [ "${HEALTHY}" = "false" ]; then
            echo "Health check failed — rolling back to previous task definition revision..."
            CLUSTER="${{ secrets.CLUSTER_NAME }}"
            SERVICE="${CLUSTER}-app"

            CURRENT_TASK_DEF=$(aws ecs describe-services \
              --cluster "${CLUSTER}" \
              --services "${SERVICE}" \
              --query 'services[0].taskDefinition' \
              --output text)

            TASK_FAMILY=$(echo "${CURRENT_TASK_DEF}" | sed 's/.*task-definition\///' | sed 's/:[0-9]*$//')
            CURRENT_REVISION=$(echo "${CURRENT_TASK_DEF}" | awk -F: '{print $NF}')
            PREVIOUS_REVISION=$((CURRENT_REVISION - 1))

            if [ "${PREVIOUS_REVISION}" -lt 1 ]; then
              echo "No previous revision available; cannot roll back automatically"
              exit 1
            fi

            aws ecs update-service \
              --cluster "${CLUSTER}" \
              --service "${SERVICE}" \
              --task-definition "${TASK_FAMILY}:${PREVIOUS_REVISION}" \
              --no-cli-pager

            echo "Rollback to ${TASK_FAMILY}:${PREVIOUS_REVISION} initiated"
            exit 1
          fi

      - name: Notify Slack on success
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": ":white_check_mark: *Production deploy succeeded*",
              "attachments": [{
                "color": "good",
                "fields": [
                  {"title": "Version", "value": "${{ steps.version.outputs.version }}", "short": true},
                  {"title": "SHA", "value": "${{ steps.version.outputs.short_sha }}", "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true},
                  {"title": "Repo", "value": "${{ github.repository }}", "short": true}
                ]
              }]
            }'

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": ":x: *Production deploy FAILED — rollback triggered*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Version", "value": "${{ steps.version.outputs.version }}", "short": true},
                  {"title": "SHA", "value": "${{ steps.version.outputs.short_sha }}", "short": true},
                  {"title": "Actor", "value": "${{ github.actor }}", "short": true},
                  {"title": "Run", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }'
