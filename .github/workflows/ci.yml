name: Build & Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: myapp

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          TAG="sha-${{ github.sha }}"
          IMAGE_REF="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build --tag "${{ steps.meta.outputs.image_ref }}" app/

      - name: Trivy scan (log summary)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_ref }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy scan (SARIF for Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_ref }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: docker push "${{ steps.meta.outputs.image_ref }}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to staging EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.STAGING_EC2_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,IMAGE_NAME
          script: |
            DATABASE_URL=$(aws secretsmanager get-secret-value \
              --secret-id myapp/database-url \
              --region us-east-1 \
              --query 'SecretString' \
              --output text | python3 -c "import sys,json; print(json.load(sys.stdin)['DATABASE_URL'])")

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull "$DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG"
            docker stop myapp || true
            docker rm myapp || true
            docker run -d \
              --name myapp \
              --restart unless-stopped \
              -p 80:8080 \
              -e DATABASE_URL="$DATABASE_URL" \
              --log-driver awslogs \
              --log-opt awslogs-region=us-east-1 \
              --log-opt awslogs-group=/myapp/staging \
              --log-opt awslogs-stream=app \
              "$DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG"

            echo "Staging running: $IMAGE_TAG"

      - name: Smoke test
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${{ secrets.STAGING_EC2_IP }}/health" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Smoke test passed"
          else
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
